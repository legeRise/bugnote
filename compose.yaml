services:
  bugnote:
    image: "habib926653/bugnote:${BUGNOTE_VERSION:-latest}"
    container_name: bugnote
    ports:
      - "127.0.0.1:${BUGNOTE_PORT:-9201}:9201"
    environment:
      MAX_JSON_BYTES: "${MAX_JSON_BYTES:-524288}"
      MAX_UPLOAD_BYTES: "${MAX_UPLOAD_BYTES:-262144000}"
    volumes:
      - "${BUGNOTE_DATA_DIR:-.}:/data"
    restart: unless-stopped
